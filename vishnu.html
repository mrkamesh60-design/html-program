<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2-Column 8-Row Table</title>
  <style>
    table {
      border-collapse: collapse;
      width: 300px;
    }
    th, td {
      border: 1px solid #000;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>

  <table>
    <tr>
      <th>NAME</th>
      <th>AGE</th>
    </tr>
    <tr>
      <td>KAMESH</td>
      <td>20</td>
    </tr>
    <tr>
      <td>VISHNU</td>
      <td>19</td>
    </tr>
    <tr>
      <td>MONI</td>
      <td>19</td>
    </tr>
    <tr>
      <td>JEEVA</td>
      <td>19</td>
    </tr>
    <tr>
      <td>KRISHNA</td>
      <td>20</td>
    </tr>
    <tr>
      <td>RAM</td>
      <td>20</td>
    </tr>
    <tr>
      <td>JAI</td>
      <td>18</td>
    </tr>
    <tr>
      <td>SHANNU</td>
      <td>19</td>
    </tr>
  </table>

</body>
</html>
